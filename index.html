<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lâm</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Lora', serif;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        a:hover h1 {
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        h1 {
            font-size: 6rem;
            color: white;
            font-weight: 300;
            letter-spacing: 9px;
            text-align: center;
            line-height: 1;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        /* Tablet (768px - 1024px) */
        @media (max-width: 1024px) {
            h1 {
                font-size: 5rem;
            }
        }

        /* Mobile (480px - 767px) */
        @media (max-width: 767px) {
            h1 {
                font-size: 3.5rem;
                letter-spacing: 6px;
            }
        }

        /* Small mobile (< 480px) */
        @media (max-width: 479px) {
            h1 {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <a href="https://www.facebook.com/mrdoanlam" target="_blank">
        <h1>LÂM</h1>
    </a>
</body>
</html>
